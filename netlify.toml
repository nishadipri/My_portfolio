[build]
  command   = "npm run build"
  publish   = "build"

[build.environment]
  NODE_VERSION = "18"

# Fixes React Router — without this, refreshing /resume or /contact gives a 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets aggressively (JS/CSS filenames are hashed so safe to cache forever)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
